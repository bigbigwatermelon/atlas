name: Codex PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]

permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number }}-${{ github.event.pull_request.head.sha }}
  cancel-in-progress: true

jobs:
  codex_review:
    name: Run Codex review
    if: ${{ github.event.pull_request.draft == false }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      OPENAI_API_KEY_SET: ${{ secrets.OPENAI_API_KEY != '' }}
    outputs:
      final_message: ${{ steps.codex.outputs['final-message'] }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: refs/pull/${{ github.event.pull_request.number }}/merge
          fetch-depth: 0
          persist-credentials: false

      - name: Pre-fetch base and head refs
        env:
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          git fetch --no-tags origin \
            "$PR_BASE_REF" \
            "+refs/pull/$PR_NUMBER/head"

      - name: Skip when OpenAI API key is not configured
        if: ${{ env.OPENAI_API_KEY_SET != 'true' }}
        run: echo "::warning::OPENAI_API_KEY is not configured; skipping Codex PR review."

      - name: Run Codex
        id: codex
        if: ${{ env.OPENAI_API_KEY_SET == 'true' }}
        uses: openai/codex-action@v1
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_BASE_REF: ${{ github.event.pull_request.base.ref }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        with:
          openai-api-key: ${{ secrets.OPENAI_API_KEY }}
          prompt-file: .github/codex/prompts/pr-review.md
          output-file: codex-review.md
          sandbox: read-only

  post_review:
    name: Post Codex review
    needs: codex_review
    if: ${{ always() && needs.codex_review.result == 'success' && needs.codex_review.outputs.final_message != '' }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post review to PR
        uses: actions/github-script@v7
        env:
          CODEX_REVIEW: ${{ needs.codex_review.outputs.final_message }}
        with:
          script: |
            const body = (process.env.CODEX_REVIEW || '').trim();
            if (!body) {
              core.info('Codex did not return review content.');
              return;
            }

            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
              event: 'COMMENT',
              body: `## Codex automated review\n\n${body}`,
            });
