<svg viewBox="0 0 720 600" xmlns="http://www.w3.org/2000/svg" font-family="'PingFang SC','Microsoft YaHei','Noto Sans CJK SC','Hiragino Sans GB',sans-serif" role="img" aria-label="Task 到交付的自动化状态机">
<rect x="0" y="0" width="720" height="600" fill="#ffffff"/>
<defs>
<marker id="a" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 z" fill="#888780"/></marker>
<marker id="aa" markerWidth="9" markerHeight="9" refX="6.5" refY="3" orient="auto"><path d="M0,0 L6.5,3 L0,6 z" fill="#BA7517"/></marker>
</defs>

<rect x="55" y="20" width="230" height="40" rx="6" fill="#F1EFE8" stroke="#D3D1C7"/><text x="170" y="38" text-anchor="middle" font-size="13" font-weight="600" fill="#2C2C2A">Task 输入</text><text x="170" y="52" text-anchor="middle" font-size="9.5" fill="#5F5E5A">PRD / bug / 重构 / spike / 链接</text>

<rect x="55" y="84" width="230" height="48" rx="6" fill="#E1F5EE" stroke="#5DCAA5"/><text x="170" y="104" text-anchor="middle" font-size="12.5" font-weight="600" fill="#085041">Lead:分类 + 规划 + 跨仓 scope</text><text x="170" y="122" text-anchor="middle" font-size="10.5" fill="#0F6E56">用 plan skill · 读 Curator 地图</text>
<rect x="430" y="84" width="250" height="48" rx="6" fill="#F1EFE8" stroke="#D3D1C7"/><text x="555" y="104" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">Curator 地图</text><text x="555" y="122" text-anchor="middle" font-size="10.5" fill="#5F5E5A">Repo Profile + 依赖图</text>
<line x1="430" y1="108" x2="287" y2="108" stroke="#888780" stroke-width="1.3" marker-end="url(#a)"/>

<rect x="55" y="156" width="230" height="40" rx="6" fill="#E1F5EE" stroke="#5DCAA5"/><text x="170" y="181" text-anchor="middle" font-size="12.5" fill="#085041">物化 worktrees(write 仓)</text>
<rect x="55" y="220" width="230" height="48" rx="6" fill="#E1F5EE" stroke="#5DCAA5"/><text x="170" y="240" text-anchor="middle" font-size="12.5" font-weight="600" fill="#085041">Workers 并行执行</text><text x="170" y="258" text-anchor="middle" font-size="10.5" fill="#0F6E56">契约先行 · 依赖序</text>
<rect x="55" y="292" width="230" height="50" rx="6" fill="#E1F5EE" stroke="#5DCAA5"/><text x="170" y="312" text-anchor="middle" font-size="12.5" font-weight="600" fill="#085041">验证 acceptance(自动 gate)</text><text x="170" y="330" text-anchor="middle" font-size="10" fill="#0F6E56">lint·type·test·契约·review-agent</text>
<rect x="55" y="392" width="230" height="42" rx="6" fill="#E1F5EE" stroke="#5DCAA5"/><text x="170" y="417" text-anchor="middle" font-size="12.5" font-weight="600" fill="#085041">Delivered(PR opened)</text>

<line x1="170" y1="60" x2="170" y2="84" stroke="#888780" stroke-width="1.4" marker-end="url(#a)"/>
<line x1="170" y1="132" x2="170" y2="156" stroke="#888780" stroke-width="1.4" marker-end="url(#a)"/>
<line x1="170" y1="196" x2="170" y2="220" stroke="#888780" stroke-width="1.4" marker-end="url(#a)"/>
<line x1="170" y1="268" x2="170" y2="292" stroke="#888780" stroke-width="1.4" marker-end="url(#a)"/>
<line x1="170" y1="342" x2="170" y2="392" stroke="#1D9E75" stroke-width="1.6" marker-end="url(#a)"/>
<text x="183" y="370" font-size="11" fill="#0F6E56">绿</text>

<path d="M55,318 C22,318 22,244 53,244" fill="none" stroke="#BA7517" stroke-width="1.4" marker-end="url(#aa)"/>
<text x="14" y="284" font-size="10" fill="#854F0B" transform="rotate(-90 14 284)">红 · 有界重试</text>

<rect x="455" y="246" width="225" height="58" rx="6" fill="#FAEEDA" stroke="#EF9F27"/><text x="567" y="270" text-anchor="middle" font-size="12.5" font-weight="600" fill="#633806">Needs you(人)</text><text x="567" y="288" text-anchor="middle" font-size="10.5" fill="#854F0B">仅异常时召唤</text>
<line x1="285" y1="244" x2="453" y2="262" stroke="#BA7517" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#aa)"/>
<line x1="285" y1="317" x2="453" y2="290" stroke="#BA7517" stroke-width="1.3" stroke-dasharray="4 3" marker-end="url(#aa)"/>
<text x="455" y="324" font-size="9.5" fill="#854F0B">触发:工具权限 · 契约/git 冲突 · 歧义 · 预算超限 · N 次仍红</text>

<line x1="40" y1="456" x2="700" y2="456" stroke="#888780" stroke-width="1" stroke-dasharray="2 3"/>
<text x="360" y="450" text-anchor="middle" font-size="10" fill="#5F5E5A">↑ Weft 自动交付边界 ↓ 交人 + CI</text>

<rect x="55" y="470" width="230" height="44" rx="6" fill="#F1EFE8" stroke="#D3D1C7"/><text x="170" y="490" text-anchor="middle" font-size="12" font-weight="600" fill="#2C2C2A">交人 + CI:review · merge · release</text><text x="170" y="506" text-anchor="middle" font-size="10.5" fill="#5F5E5A">仓库现有 PR harness</text>
<line x1="170" y1="434" x2="170" y2="470" stroke="#888780" stroke-width="1.4" marker-end="url(#a)"/>

<rect x="40" y="538" width="640" height="48" rx="6" fill="#F7F6F2" stroke="#E4E2DA"/>
<text x="56" y="558" font-size="10" font-weight="600" fill="#444441">图例</text>
<line x1="56" y1="574" x2="86" y2="574" stroke="#888780" stroke-width="1.5" marker-end="url(#a)"/><text x="92" y="578" font-size="10" fill="#5F5E5A">自动流转</text>
<line x1="180" y1="574" x2="210" y2="574" stroke="#BA7517" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#aa)"/><text x="216" y="578" font-size="10" fill="#854F0B">升级给人(异常)</text>
<text x="360" y="578" font-size="10" fill="#5F5E5A">绿块=Weft 自动;琥珀=人;灰=外部/交人</text>
</svg>
